<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Myth of Zigsyphus</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-base-200 text-base-content">
    <header class="navbar border-b border-base-300 bg-base-100 px-4 lg:px-8">
      <div class="flex-1">
        <div>
          <p class="text-xs font-bold uppercase text-primary">Zigsyphus</p>
          <h1 class="text-xl font-bold lg:text-3xl">The daily wrong-answer machine</h1>
        </div>
      </div>
      <a class="link link-primary text-sm" href="../data/gold/summary.json">gold summary</a>
    </header>

    <main class="shell">
      <section id="stats" class="stats-grid"></section>
      <section class="card border border-base-300 bg-base-100 shadow-sm">
        <div class="card-body">
          <div class="flex flex-col gap-2 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <h2 class="card-title">Score Trend</h2>
              <p class="text-sm text-base-content/60">One attempt per row, forever.</p>
            </div>
            <input id="filter" class="input input-bordered input-sm w-full lg:max-w-xs" placeholder="Filter runs" />
          </div>
          <div id="chart" class="chart"></div>
          <div id="runs"></div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
